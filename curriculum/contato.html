<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            padding: 12px 20px;
        }

        .btn-roxo {
            background: linear-gradient(45deg, #7b2ff7, #9b4dff);
            color: white;
            border: none;
        }

        .form-container {
            max-width: 700px;
            margin: 30px auto 80px auto;
            background: #e9ecef;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0d1b2a;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-enviar {
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
        }

        .footer {
            background: #111;
            color: white;
            padding: 20px 0;
        }

        .icon-circle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2c2c2c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        #relogio {
            font-weight: bold;
        }

        .dark {
            background-color: #121212;
            color: white;
        }

        .dark .form-container {
            background: #1e1e1e;
            color: white;
        }

        .dark input,
        .dark textarea,
        .dark select {
            background: #2c2c2c;
            color: white;
            border: 1px solid #555;
        }

        .dark h2 {
            color: #ffffff;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4">
        <div class="container-fluid">

            <!-- Menu Hamburguer -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a href="index.html" class="nav-link active">Home</a></li>
                    <li class="nav-item"><a href="portifolio.html" class="nav-link">Portfólio</a></li>
                    <li class="nav-item"><a href="contato.html" class="nav-link">Contato</a></li>
                </ul>

                <button id="botaoTema" class="text-center text-white bg-dark">Claro/Escuro</button>

                <span id="relogio" class="text-white me-3"></span>
            </div>
        </div>
    </nav>

    <!-- Form -->
    <div class="form-container">

        <h2>Formulário de Feedback</h2>

        <form id="formContato">

            <div class="row">
                <div class="col-md-6">
                    <input type="text" class="form-control mb-3" id="primeiroNome" placeholder="Primeiro Nome">
                </div>
                <div class="col-md-6">
                    <input type="text" class="form-control mb-3" id="ultimoNome" placeholder="Último Nome">
                </div>
            </div>

            <input type="email" class="form-control mb-3" id="email" placeholder="Email">

            <label>Pontos interessantes:</label>
            <textarea class="form-control mb-3" id="pontosInteressantes"></textarea>

            <label>Habilidade:</label>
            <select class="form-select mb-3" id="habilidade">
                <option>Escolha...</option>
                <option>Front-end</option>
                <option>Back-end</option>
                <option>Design</option>
            </select>

            <label>Quais Pontos Chamaram a Atenção?:</label>
            <div class="form-check"><input type="checkbox" class="form-check-input"> Front-end</div>
            <div class="form-check"><input type="checkbox" class="form-check-input"> Back-end</div>
            <div class="form-check"><input type="checkbox" class="form-check-input"> Design</div>
            <div class="form-check"><input type="checkbox" class="form-check-input"> Arte Visual</div>

            <label class="mt-3">Nota:</label>
            <div class="d-flex flex-wrap gap-2 mb-3">
                <script>
                    for (let i = 1; i <= 10; i++) {
                        document.write(`
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="nota"> ${i}
                            </div>
                        `)
                    }
                </script>
            </div>

            <textarea class="form-control mb-3" id="comentario" placeholder="Comentário"></textarea>

            <div class="text-center">
                <button type="submit" class="btn btn-enviar">
                    <i class="bi bi-send"></i> Enviar
                </button>
            </div>

        </form>

    </div>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <a href="index.html"><button class="btn btn-roxo mb-3">Voltar</button></a>

            <div class="d-flex justify-content-center gap-3">
                <a href="https://www.instagram.com/marcosiy_?igsh=MTk4ODk3MjI2M2piNg==" class="icon-circle"><i
                        class="bi bi-instagram"></i></a>
            </div>

            <p class="mt-2 small text-secondary">Currículo Digital</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function atualizarRelogio() {
            var agora = new Date()
            var h = String(agora.getHours()).padStart(2, "0")
            var m = String(agora.getMinutes()).padStart(2, "0")
            var s = String(agora.getSeconds()).padStart(2, "0")
            document.getElementById("relogio").innerText = `${h}:${m}:${s}`
        }

        setInterval(atualizarRelogio, 1000)

        document.getElementById("botaoTema").addEventListener("click", () => {
            document.body.classList.toggle("dark")
        })

        function enviarEmail() {

            const primeiroNome = document.getElementById("primeiroNome").value;
            const ultimoNome = document.getElementById("ultimoNome").value;
            const email = document.getElementById("email").value;
            const pontosInteressantes = document.getElementById("pontosInteressantes").value;
            const habilidade = document.getElementById("habilidade").value;
            const comentario = document.getElementById("comentario").value;

            const emailDestino = "marcosmdn.btu@gmail.com";

            const assunto = encodeURIComponent("Feedback do Portfólio");

            const corpoEmail = encodeURIComponent(
                `Nome: ${primeiroNome} ${ultimoNome}

Email: ${email}

Pontos Interessantes:
${pontosInteressantes}

Habilidade:
${habilidade}

Comentário:
${comentario}`
            );

            const urlGmail =
                `https://mail.google.com/mail/?view=cm&fs=1&to=${emailDestino}&su=${assunto}&body=${corpoEmail}`;

            window.open(urlGmail, "_blank");
        }

        document.getElementById("formContato").addEventListener("submit", function (e) {
            e.preventDefault();
            enviarEmail();
        });
    </script>

</body>

</html>
